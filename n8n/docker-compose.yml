services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    network_mode: host
    user: "1000:1000"
    environment:
      - N8N_PORT=5678
      - N8N_HOST=0.0.0.0
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://100.99.6.88:5678/
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER:-peter}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
      - GENERIC_TIMEZONE=America/Denver
      - TZ=America/Denver
    volumes:
      - /home/peter/n8n_data:/home/node/.n8n
    restart: unless-stopped
